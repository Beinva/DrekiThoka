---
layout: default
title: Articles Forge
---

<div class="container my-5">
  <h1>Nos articles sur la Forge 🔨</h1>
  <div class="row">
    {% for post in site.forge %}
      <div class="col-md-6 mb-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">{{ post.title }}</h5>
            <p class="card-text">{{ post.excerpt }}</p>
            <a href="{{ post.url }}" class="btn btn-outline-danger">Lire</a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
