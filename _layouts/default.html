<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Vos styles personnalisés (pour le filigrane et les couleurs spécifiques) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Navigation (Optionnel mais recommandé) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">{{ site.title }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/forge/">Forge</a></li>
          <li class="nav-item"><a class="nav-link" href="/plantes/">Plantes</a></li>
          <li class="nav-item"><a class="nav-link" href="/teinture/">Teinture</a></li>
          <li class="nav-item"><a class="nav-link" href="/ceramique/">Céramique</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenu de la page -->
  {{ content }}

  <!-- Footer -->
  <footer class="bg-light text-center py-4 mt-5">
    <div class="container">
      <p>&copy; 2024 {{ site.title }} - Tous droits réservés.</p>
    </div>
  </footer>

  <!-- Script Bootstrap JS (nécessaire pour le menu mobile) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FILIGRANE (Votre code CSS personnalisé doit être dans style.css) -->
  <div class="watermark">
    <img src="{{ '/images/filigrane.png' | relative_url }}" alt="Filigrane">
  </div>

</body>
</html>
